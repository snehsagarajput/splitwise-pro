<!DOCTYPE html>
<html>
<head>
  <style>
    body { 
      width: 220px; 
      padding: 15px; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      text-align: center; 
      margin: 0;
    }
    h3 {
      margin-top: 0;
      color: #333;
    }
    .status { 
      font-weight: bold; 
      padding: 12px; 
      border-radius: 6px; 
      margin-top: 10px; 
      font-size: 14px;
    }
    .active { 
      background-color: #d4edda; 
      color: #155724; 
      border: 1px solid #c3e6cb;
    }
    .inactive { 
      background-color: #f8d7da; 
      color: #721c24; 
      border: 1px solid #f5c6cb;
    }
  </style>
</head>
<body>
  <h3>Splitwise Pro</h3>
  <div id="statusBox" class="status">Checking status...</div>
  <script src="popup.js"></script>
</body>
</html>
